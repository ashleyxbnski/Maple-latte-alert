name: Check Maple Latte Stock

on:
  schedule:
    # Runs every 15 minutes. GitHub may delay this slightly during
    # high load, but it's free and requires nothing running on your end.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          TEXT_GATEWAY: ${{ secrets.TEXT_GATEWAY }}
        run: python checker.py

      - name: Commit updated state
        run: |
          git config user.name "stock-checker-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update stock state"
          git push
